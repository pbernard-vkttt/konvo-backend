spring:
  application:
    name: konvo-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/konvo_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:passwrd}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:konvo_mq}
    password: ${RABBITMQ_PASSWORD:Konvo2026!}
    virtual-host: /
    listener:
      simple:
        # Reject (don't infinitely requeue) a message the listener can't handle
        # so it dead-letters to konvo.deadletter instead of hot-looping. The
        # in-memory retry softens transient blips (e.g. a brief DB outage)
        # before the final reject (audit H-2). The outbound-send listener does
        # its own provider-aware retry on top of this safety net.
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1s
          multiplier: 2
          max-interval: 10s
  data:
    redis:
      # Spring Data Redis auto-config only attaches when host is set; the
      # default dev/native run keeps using the in-memory SSE hub + ticket
      # store. Production sets REDIS_HOST so KONVO_REALTIME_BUS=redis works.
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          enabled: true

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    # M3 lights up the webhook ingest + outbound send queues; rabbit health
    # is back in the picture. Local dev needs a running RabbitMQ (see
    # infra/README.md → "Running without Docker").
    rabbit:
      enabled: true
    db:
      enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: Konvo CRM API
    version: '@project.version@'

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

konvo:
  security:
    jwt:
      signing-secret: ${JWT_SIGNING_SECRET:dev-only-do-not-use-in-production-change-me-please-32+chars}
      access-token-ttl-minutes: 15
      refresh-token-ttl-days: 30
    # AES-256-GCM key used by EncryptedStringConverter for channel secrets
    # (channels.app_secret, channels.access_token). Generate one with:
    #   openssl rand -base64 32
    # Dev-only 32-byte AES key. Production MUST override via KONVO_CRYPTO_KEY.
    crypto-key: ${KONVO_CRYPTO_KEY:ZGV2LW9ubHkta29udm8tYWVzLTI1Ni1rZXktMDAwMDE=}
  public-base-url:
    app: ${APP_PUBLIC_BASE_URL:http://localhost:4200}
    api: ${API_PUBLIC_BASE_URL:http://localhost:8080}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  ai:
    default-provider: ${AI_DEFAULT_PROVIDER:stub}
    groq:
      api-key: ${GROQ_API_KEY:}
    openai:
      api-key: ${OPENAI_API_KEY:}
  realtime:
    # `local` keeps M4's in-memory fan-out (single-pod). `redis` switches the
    # SSE hub + ticket store to Redis pub/sub for multi-pod deploys (M8).
    bus: ${KONVO_REALTIME_BUS:local}
  email:
    provider: ${KONVO_EMAIL_PROVIDER:stub}
    from: ${KONVO_EMAIL_FROM:no-reply@konvelo.io}
  auth:
    dev-token-in-response: ${KONVO_AUTH_DEV_TOKEN_IN_RESPONSE:false}
  # Per-IP + per-email token-bucket throttling on the public auth endpoints
  # (login, forgot-password). In-memory per pod (audit H-4). Disable only for
  # load tests via KONVO_RATELIMIT_ENABLED=false.
  ratelimit:
    enabled: ${KONVO_RATELIMIT_ENABLED:true}
  # Transactional outbox relay (audit H-1). The relay polls for due rows and
  # publishes them to RabbitMQ with exponential backoff; ShedLock keeps a single
  # runner across pods.
  outbox:
    poll-ms: ${KONVO_OUTBOX_POLL_MS:1000}
    batch-size: ${KONVO_OUTBOX_BATCH_SIZE:50}
    max-attempts: ${KONVO_OUTBOX_MAX_ATTEMPTS:10}
    base-backoff-ms: ${KONVO_OUTBOX_BASE_BACKOFF_MS:2000}
    max-backoff-ms: ${KONVO_OUTBOX_MAX_BACKOFF_MS:300000}
  whatsapp:
    provider: ${WHATSAPP_PROVIDER:stub}
    # Outbound send retry around the provider call (audit H-2). Transient
    # failures (429/5xx/network) back off exponentially before the message is
    # marked failed; permanent failures fail fast.
    send:
      max-attempts: ${KONVO_WHATSAPP_SEND_MAX_ATTEMPTS:4}
      initial-backoff-ms: ${KONVO_WHATSAPP_SEND_INITIAL_BACKOFF_MS:500}
    meta:
      app-id: ${META_APP_ID:}
      app-secret: ${META_APP_SECRET:}
      verify-token: ${META_VERIFY_TOKEN:konvo-dev-verify}
      webhook-secret: ${META_WEBHOOK_SECRET:}
  storage:
    provider: ${STORAGE_PROVIDER:local}
    r2:
      account-id: ${R2_ACCOUNT_ID:}
      access-key-id: ${R2_ACCESS_KEY_ID:}
      secret-access-key: ${R2_SECRET_ACCESS_KEY:}
      bucket: ${R2_BUCKET:}
      public-base-url: ${R2_PUBLIC_BASE_URL:}

logging:
  level:
    root: INFO
    com.vulkantechtt.konvo: DEBUG
    org.springframework.web: INFO
