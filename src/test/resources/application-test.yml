# Profile activated by KonvoCrmApplicationTests. Testcontainers provides the
# datasource URL via @DynamicPropertySource; everything else mirrors the dev
# defaults but with stub providers explicitly forced (so a missing env var
# can't sneak a real-provider call into a unit run).

konvo:
  security:
    jwt:
      signing-secret: test-only-signing-secret-32-characters-min-yep
      access-token-ttl-minutes: 15
      refresh-token-ttl-days: 30
      refresh-cookie-secure: false
    crypto-key: dGVzdC1vbmx5LWtvbnZvLWFlczI1Ni1rZXktMDAwMDE=
  ai:
    default-provider: stub
  whatsapp:
    provider: stub
  storage:
    provider: local
  cors:
    allowed-origins: http://localhost:4200

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
